<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="max-w-md w-full bg-white rounded-lg shadow-md p-8">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Instructor Login</h2>
    
    <div *ngIf="errorMessage" class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
        <input type="email" formControlName="email" class="w-full p-3 border rounded border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
        <input type="password" formControlName="password" class="w-full p-3 border rounded border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading" 
              class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded hover:bg-blue-700 disabled:bg-blue-300 transition duration-200">
        {{ isLoading ? 'Logging in...' : 'Log In' }}
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-4">
      Need an account? <a routerLink="/register" class="text-blue-600 hover:underline">Sign up</a>
    </p>
  </div>
</div>
