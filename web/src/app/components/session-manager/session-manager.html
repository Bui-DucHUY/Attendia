<div class="min-h-screen bg-gray-50 p-8">
  <div class="max-w-3xl mx-auto">
    
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Class: {{ classCrn }}</h1>
      <button (click)="endSession()" *ngIf="isSessionActive" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
        End Session Early
      </button>
      <button routerLink="/dashboard" *ngIf="!isSessionActive" class="text-gray-600 hover:text-gray-900 font-medium">
        &larr; Back to Dashboard
      </button>
    </div>

    <div *ngIf="errorMessage" class="bg-red-100 text-red-700 p-4 rounded-lg mb-6">
      {{ errorMessage }}
    </div>

    <div *ngIf="!isSessionActive" class="bg-white rounded-xl shadow-sm p-8 border border-gray-100">
      <h2 class="text-xl font-semibold mb-6 border-b pb-4">Start New Attendance Session</h2>
      
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2">Check-in Time Limit (Minutes)</label>
        <input type="number" [(ngModel)]="durationMinutes" class="w-full p-3 border rounded border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div class="mb-8 flex items-center">
        <input type="checkbox" id="reqImage" [(ngModel)]="requiresImage" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
        <label for="reqImage" class="ml-3 text-gray-700 font-medium">Require students to capture a live photo</label>
      </div>

      <button (click)="startSession()" [disabled]="isLoading" class="w-full bg-green-600 text-white font-bold py-4 px-4 rounded-lg hover:bg-green-700 disabled:bg-green-300 text-lg transition-colors">
        {{ isLoading ? 'Generating...' : 'Generate QR Code' }}
      </button>
    </div>

    <div *ngIf="isSessionActive" class="bg-white rounded-xl shadow-lg p-10 text-center border-4 border-green-500">
      <div class="animate-pulse bg-green-100 text-green-800 px-4 py-2 rounded-full inline-block font-bold mb-6">
        SESSION ACTIVE - ACCEPTING CHECK-INS
      </div>
      
      <h2 class="text-2xl text-gray-700 mb-8 font-medium">Scan this code to check in:</h2>
      
      <div class="flex justify-center mb-8 bg-white p-4 inline-block rounded-xl border border-gray-200 shadow-sm">
        <qrcode [qrdata]="qrCodeUrl" [width]="400" [errorCorrectionLevel]="'M'"></qrcode>
      </div>

      <p class="text-gray-500 mb-2">Or navigate manually to:</p>
      <a [href]="qrCodeUrl" target="_blank" class="text-blue-600 font-mono text-lg break-all hover:underline">
        {{ qrCodeUrl }}
      </a>
    </div>

  </div>
</div>
